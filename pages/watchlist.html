<body>

  <div class="sb-xp" id="sXp" style="display:none"><div class="sb-xp-fila"><span class="sb-xp-nivel" id="sLevel">NIVEL 1</span><span class="sb-xp-numero" id="sXpNum">0 XP</span></div><div class="sb-xp-pista"><div class="sb-xp-relleno" id="sXpFill" style="width:0%"></div></div><div class="sb-xp-siguiente" id="sXpNext"></div></div>
  <nav class="sb-nav">
    <a href="../index.html"  class="nav-elemento"><span class="nav-icono">◈</span> Explorar</a>
    <a href="perfil.html"   class="nav-elemento" id="navPerfil"><span class="nav-icono">◎</span> Mi Perfil</a>
    <a href="diario.html"   class="nav-elemento" id="navDiario"><span class="nav-icono">◻</span> Diario</a>

    <a href="logros.html"   class="nav-elemento" id="navLogros"><span class="nav-icono">◆</span> Logros<span class="nav-insignia" id="logrosBadge" style="display:none">0</span></a>
    <a href="buscar-usuarios.html" class="nav-elemento" id="navBuscar"><span class="nav-icono">⊕</span> Buscar</a>
  </nav>
  <div class="sb-estadisticas" id="sStats" style="display:none">
    <div class="sb-estadistica"><div class="sb-stat-numero" id="stVistas">0</div><div class="sb-stat-etiqueta">Vistas</div></div>
    <div class="sb-estadistica"><div class="sb-stat-numero" id="stResenas">0</div><div class="sb-stat-etiqueta">Reseñas</div></div>
    <div class="sb-estadistica"><div class="sb-stat-numero" id="stWatchlist">0</div><div class="sb-stat-etiqueta">Watchlist</div></div>

</aside>

<!-- ===================== CONTENIDO PRINCIPAL ===================== -->
<main class="contenido-principal">

  <!-- Topbar con título y contador de películas en la watchlist -->
  <div class="barra-superior">
    <h2 style="font-family:var(--fuente-display);font-size:22px;font-weight:900;">Watchlist</h2>
    <!-- El JS rellena este span con el número de películas, ej: "— 3 películas" -->
    <span id="contadorWatchlist" style="font-size:11px;color:var(--apagado);margin-left:8px"></span>
  </div>

  <div class="pagina-contenido">
    <!-- Usa el mismo grid de tarjetas que la página principal -->
    <!-- El JS lo rellena con las películas que el usuario tiene pendientes de ver -->
    <div class="cuadricula-peliculas" id="gridWatchlist"></div>
  </div>
</main>

<!-- BUG 1 FIX: Se eliminó el <div id="movieModalBg"> vacío.
     abrirModal() en ui.js lo crea dinámicamente con todo su contenido. -->

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
// Función que renderiza la cuadrícula de películas de la watchlist
function renderizarWatchlist() {
  const usuario = AUTENTICACION.obtenerUsuarioActual();
  const grid    = document.getElementById('gridWatchlist');

  // Si no hay sesión, muestra mensaje de acceso restringido
  if (!usuario) {
    // grid-column:1/-1 hace que el mensaje ocupe todas las columnas del grid
    grid.innerHTML = `<div class="vacio" style="grid-column:1/-1"><div class="vacio-icono">🔒</div><div class="vacio-titulo">Inicia sesión</div><p class="vacio-texto"><a href="login.html">Inicia sesión</a> para ver tu watchlist</p></div>`;
    return;
  }

  const datos     = AUTENTICACION.obtenerDatosUsuario(usuario.nombreUsuario);
  // Filtra el catálogo para obtener solo las películas que están en la watchlist del usuario
  const peliculas = PELICULAS.filter(m => datos.watchlist.includes(m.id));

  // Actualiza el contador de películas en el topbar
  document.getElementById('contadorWatchlist').textContent = `— ${peliculas.length} películas`;

  // Si la watchlist está vacía, muestra un estado vacío con instrucciones
  if (peliculas.length === 0) {
    grid.innerHTML = `<div class="vacio" style="grid-column:1/-1"><div class="vacio-icono">🔖</div><div class="vacio-titulo">Tu watchlist está vacía</div><p class="vacio-texto">Añade películas que quieras ver en el futuro</p></div>`;
    return;
  }

  // Construye las tarjetas de película reutilizando las mismas clases que el catálogo principal
  // Todas las tarjetas llevan el icono 🔖 para indicar que están en la watchlist
  grid.innerHTML = peliculas.map(pelicula => `
    <div class="tarjeta-peli" onclick="abrirModal(${pelicula.id})">
      <div class="tarjeta-poster">
        <img class="tarjeta-imagen" src="${pelicula.imagen}" alt="${pelicula.titulo}" loading="lazy" />
        <div class="tarjeta-overlay"><div class="tarjeta-play">▶</div></div>
        <!-- Insignia de marcador fija en todas las tarjetas de la watchlist -->
        <span class="tarjeta-insignia insignia-watchlist">🔖</span>
      </div>
      <p class="tarjeta-titulo">${pelicula.titulo}</p>
      <p class="tarjeta-meta">${pelicula.anio} · ${pelicula.genero}</p>
    </div>`).join('');
}

// Expone renderizarWatchlist como refrescarGrid para que el modal pueda actualizar
// la lista cuando el usuario marca una película como vista (y sale de la watchlist)
refrescarGrid = renderizarWatchlist;

// Espera a que el DOM esté listo antes de renderizar e inicializar el sidebar
document.addEventListener('DOMContentLoaded', renderizarWatchlist);
</script>
</body>
</html>
