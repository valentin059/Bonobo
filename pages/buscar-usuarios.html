<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscar Usuarios — BONOBO</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

<!-- ===================== BARRA LATERAL ===================== -->
<aside class="barra-lateral">
  <div class="sb-logo">
    <a href="../index.html" class="sb-logo-enlace"><div class="sb-logo-marca"></div>
      <div class="sb-nombre-marca"><div class="sb-nombre">BONOBO</div><div class="sb-subtitulo">DIARIO CINEMATOGRÁFICO</div></div>
    </a>
  </div>
  <div class="sb-xp" id="sXp" style="display:none">
    <div class="sb-xp-fila"><span class="sb-xp-nivel" id="sLevel">NIVEL 1</span><span class="sb-xp-numero" id="sXpNum">0 XP</span></div>
    <div class="sb-xp-pista"><div class="sb-xp-relleno" id="sXpFill" style="width:0%"></div></div>
    <div class="sb-xp-siguiente" id="sXpNext"></div>
  </div>
  <nav class="sb-nav">
    <a href="../index.html"        class="nav-elemento"><span class="nav-icono">◈</span> Explorar</a>
    <a href="perfil.html"          class="nav-elemento" id="navPerfil"><span class="nav-icono">◎</span> Mi Perfil</a>
    <a href="diario.html"          class="nav-elemento" id="navDiario"><span class="nav-icono">◻</span> Diario</a>
    <a href="watchlist.html"       class="nav-elemento" id="navWatchlist"><span class="nav-icono">◷</span> Watchlist</a>
    <a href="listas.html"          class="nav-elemento" id="navListas"><span class="nav-icono">▤</span> Listas</a>
    <a href="logros.html"          class="nav-elemento" id="navLogros"><span class="nav-icono">◆</span> Logros<span class="nav-insignia" id="logrosBadge" style="display:none">0</span></a>
    <a href="buscar-usuarios.html" class="nav-elemento activo" id="navBuscar"><span class="nav-icono">⊕</span> Buscar</a>
    <!-- "activo" marca esta página como la sección actual en el menú -->
  </nav>
  <div class="sb-estadisticas" id="sStats" style="display:none">
    <div class="sb-estadistica"><div class="sb-stat-numero" id="stVistas">0</div><div class="sb-stat-etiqueta">Vistas</div></div>
    <div class="sb-estadistica"><div class="sb-stat-numero" id="stResenas">0</div><div class="sb-stat-etiqueta">Reseñas</div></div>
    <div class="sb-estadistica"><div class="sb-stat-numero" id="stWatchlist">0</div><div class="sb-stat-etiqueta">Watchlist</div></div>
    <div class="sb-estadistica"><div class="sb-stat-numero" id="stLogros">0</div><div class="sb-stat-etiqueta">Logros</div></div>
  </div>
  <div class="sb-auth" id="sAuth"><a href="login.html" class="btn-iniciar-sesion">Iniciar sesión</a><a href="registro.html" class="btn-registro">Registrarse</a></div>
  <div class="sb-usuario" id="sUser" style="display:none"><div class="sb-avatar"></div><div><div class="sb-u-nombre" id="sUsername">—</div><button class="sb-u-cerrar" id="btnLogout">Cerrar sesión</button></div></div>
</aside>

<!-- ===================== CONTENIDO PRINCIPAL ===================== -->
<main class="contenido-principal">
  <div class="barra-superior">
    <h2 style="font-family:var(--fuente-display);font-size:22px;font-weight:900;letter-spacing:-.3px;">Buscar Usuarios</h2>
  </div>
  <div class="pagina-contenido">

    <!-- Campo de búsqueda: filtra usuarios en tiempo real al escribir (oninput llama a buscar) -->
    <div style="display:flex;gap:10px;margin-bottom:28px">
      <input type="text" id="searchInput" class="campo-entrada" placeholder="Buscar por username…"
        style="flex:1" oninput="buscar()" />
    </div>

    <!-- Sección "Siguiendo": lista de usuarios a los que sigue el usuario actual -->
    <!-- Si no hay sesión, muestra un aviso informativo en su lugar -->
    <div id="seccionSiguiendo"></div>

    <!-- Sección de resultados: aparece solo cuando el usuario escribe en el buscador -->
    <div id="resultadosBusqueda"></div>

    <!-- Sección de ranking: tabla de posiciones por XP entre el usuario y sus seguidos -->
    <div id="seccionRanking"></div>

  </div>
</main>

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/social.js"></script>
<script>
// Genera el HTML de una tarjeta de usuario con avatar, info y botón de seguir
function tarjetaUsuarioHTML(u, usuarioActual) {
  if (!u) return '';
  const datos       = AUTENTICACION.obtenerDatosUsuario(u.nombreUsuario);
  const soyYo       = usuarioActual && u.nombreUsuario === usuarioActual.nombreUsuario;
  const leSigo      = usuarioActual && !soyYo && SOCIAL.estaSiguiendo(u.nombreUsuario);
  const nivel       = Math.max(1, Math.floor(datos.xp / 100));
  const av          = u.avatar || datos.avatar;
  const seguidores  = SOCIAL.obtenerSeguidores(u.nombreUsuario).length;

  return `<div class="tarjeta-usuario">
    <!-- La parte izquierda de la tarjeta es un enlace al perfil público del usuario -->
    <a href="usuario.html?u=${encodeURIComponent(u.nombreUsuario)}" class="tarjeta-usuario-enlace">
      <!-- Avatar: imagen si tiene, inicial del nombreUsuario si no tiene foto -->
      <div class="tarjeta-usuario-avatar ${av ? '' : 'avi-letra'}" style="${av ? `background-image:url(${av});background-size:cover;background-position:center` : ''}">
        ${av ? '' : u.nombreUsuario[0].toUpperCase()}
      </div>
      <div class="tarjeta-usuario-info">
        <span class="tarjeta-usuario-nombre">${u.nombreUsuario}</span>
        <!-- Metadatos: nivel, películas vistas y número de seguidores -->
        <span class="tarjeta-usuario-meta">Nv.${nivel} · ${datos.vistas.length} vistas · ${seguidores} seguidores</span>
        <!-- Bio truncada a 60 caracteres si es más larga -->
        ${u.bio ? `<p class="tarjeta-usuario-bio">${u.bio.substring(0,60)}${u.bio.length>60?'…':''}</p>` : ''}
      </div>
    </a>
    <!-- Botón de seguir/dejar de seguir: solo visible para otros usuarios, no para uno mismo -->
    ${!soyYo && usuarioActual ? `
      <button class="btn-seguir ${leSigo?'siguiendo':''}"
        onclick="alternarSeguirTarjeta('${u.nombreUsuario}',this)">
        ${leSigo ? '✓ Siguiendo' : '+ Seguir'}
      </button>` : ''}
    <!-- Etiqueta "Tú" en lugar del botón si la tarjeta es del propio usuario -->
    ${soyYo ? `<span style="font-size:10px;color:var(--apagado);padding:6px">Tú</span>` : ''}
  </div>`;
}

// Alterna el estado de seguir/dejar de seguir a un usuario desde su tarjeta
function alternarSeguirTarjeta(nombreUsuario, boton) {
  const usuarioActual = AUTENTICACION.obtenerUsuarioActual();
  // Si no hay sesión, redirige al login en lugar de hacer nada
  if (!usuarioActual) { window.location.href='login.html'; return; }
  const leSigo = SOCIAL.estaSiguiendo(nombreUsuario);
  if (leSigo) { SOCIAL.dejarDeSeguir(nombreUsuario); boton.className='btn-seguir'; boton.textContent='+ Seguir'; }
  else        { SOCIAL.seguir(nombreUsuario);         boton.className='btn-seguir siguiendo'; boton.textContent='✓ Siguiendo'; }
  // Actualiza la sección "Siguiendo" y el ranking para reflejar el cambio
  renderizarSiguiendo();
  renderizarRanking();
  // Actualiza el sidebar (puede haber cambiado el nivel por logro de seguir)
  inicializarSidebar();
}

// Filtra y muestra usuarios cuyo nombreUsuario coincide con el texto del buscador
function buscar() {
  const q             = document.getElementById('searchInput').value.trim().toLowerCase();
  const el            = document.getElementById('resultadosBusqueda');
  const usuarioActual = AUTENTICACION.obtenerUsuarioActual();

  // Si el campo está vacío, oculta los resultados
  if (!q) { el.innerHTML = ''; return; }

  const todos      = AUTENTICACION.obtenerUsuarios();
  // Filtra todos los usuarios registrados buscando coincidencia parcial en el nombreUsuario
  const encontrados = todos.filter(u => u.nombreUsuario.toLowerCase().includes(q));

  if (!encontrados.length) {
    el.innerHTML = `<div class="vacio"><div class="vacio-icono">🔍</div><div class="vacio-titulo">Sin resultados</div><p class="vacio-texto">No hay usuarios con ese username.</p></div>`;
    return;
  }

  // Muestra los resultados con su cabecera de sección y contador
  el.innerHTML = `
    <div class="seccion-titulo" style="padding:0;margin-bottom:14px">
      <span class="seccion-icono">🔍</span>
      <span class="seccion-texto">Resultados (${encontrados.length})</span>
      <div class="seccion-linea"></div>
    </div>
    <div class="lista-usuarios">${encontrados.map(u => tarjetaUsuarioHTML(u, usuarioActual)).join('')}</div>`;
}

// Renderiza la sección "Siguiendo" con los usuarios a los que sigue el usuario actual
function renderizarSiguiendo() {
  const el            = document.getElementById('seccionSiguiendo');
  const usuarioActual = AUTENTICACION.obtenerUsuarioActual();

  // RF-16: buscar usuarios es accesible sin autenticación (Documento Maestro).
  // Si el visitante no está registrado, mostramos un aviso informativo
  // pero la búsqueda sigue funcionando completamente.
  if (!usuarioActual) {
    // Muestra un banner informativo explicando qué funciona sin cuenta y qué requiere login
    el.innerHTML = `<div style="
      background:var(--superficie);border:1px solid var(--borde);
      border-radius:var(--radio);padding:18px 20px;margin-bottom:28px;
      display:flex;align-items:center;gap:14px">
      <span style="font-size:28px">🔍</span>
      <div>
        <p style="font-family:var(--fuente-ui);font-size:12px;font-weight:700;
          color:var(--texto);margin-bottom:4px">Busca a cualquier usuario</p>
        <p style="font-size:12px;color:var(--tenue);line-height:1.6">
          Puedes buscar y ver perfiles sin necesidad de cuenta.<br>
          Para <strong style="color:var(--acento-claro)">seguir usuarios</strong> necesitas
          <a href="login.html" style="color:var(--acento);text-decoration:underline">iniciar sesión</a>
          o <a href="registro.html" style="color:var(--acento);text-decoration:underline">registrarte</a>.
        </p>
      </div>
    </div>`;
    return;
  }

  const seguidos = SOCIAL.obtenerSeguidos(usuarioActual.nombreUsuario);

  // Si no sigue a nadie todavía, muestra un mensaje animando a buscar
  if (!seguidos.length) {
    el.innerHTML = `<div style="margin-bottom:28px">
      <div class="seccion-titulo" style="padding:0;margin-bottom:14px">
        <span class="seccion-icono">👥</span><span class="seccion-texto">Siguiendo (0)</span><div class="seccion-linea"></div>
      </div>
      <p style="color:var(--apagado);font-size:12px">Aún no sigues a nadie. ¡Busca por username para encontrar amigos!</p>
    </div>`;
    return;
  }

  // Muestra la lista de usuarios seguidos con sus tarjetas
  el.innerHTML = `<div style="margin-bottom:36px">
    <div class="seccion-titulo" style="padding:0;margin-bottom:14px">
      <span class="seccion-icono">👥</span><span class="seccion-texto">Siguiendo (${seguidos.length})</span><div class="seccion-linea"></div>
    </div>
    <div class="lista-usuarios">${seguidos.map(u => tarjetaUsuarioHTML(u, usuarioActual)).join('')}</div>
  </div>`;
}

// Renderiza el ranking de XP entre el usuario actual y todos sus seguidos
function renderizarRanking() {
  const el            = document.getElementById('seccionRanking');
  const usuarioActual = AUTENTICACION.obtenerUsuarioActual();
  // Sin sesión o sin seguidos, no hay ranking que mostrar
  if (!usuarioActual) { el.innerHTML=''; return; }

  const ranking = SOCIAL.obtenerRankingAmigos();
  // Si solo está el propio usuario en el ranking (sin seguidos), no lo muestra
  if (ranking.length <= 1) { el.innerHTML=''; return; }

  el.innerHTML = `<div style="margin-top:36px">
    <div class="seccion-titulo" style="padding:0;margin-bottom:14px">
      <span class="seccion-icono">🏆</span><span class="seccion-texto">Ranking entre amigos</span><div class="seccion-linea"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${ranking.map((r, i) => {
        const soyYo = r.usuario?.nombreUsuario === usuarioActual.nombreUsuario;
        const av    = r.usuario?.avatar || AUTENTICACION.obtenerDatosUsuario(r.usuario?.nombreUsuario||'')?.avatar;
        return `<div class="ranking-fila ${soyYo?'ranking-yo':''}">
          <!-- Posición en el ranking (1, 2, 3...) — dorada para el propio usuario -->
          <span class="ranking-posicion">${i+1}</span>
          <!-- Avatar circular del usuario en el ranking -->
          <div class="resena-avatar" style="${av?`background-image:url(${av});background-size:cover`:''}">
            ${av ? '' : (r.usuario?.nombreUsuario||'?')[0].toUpperCase()}
          </div>
          <!-- Nombre con "(tú)" si es el usuario actual -->
          <span class="ranking-nombre">${r.usuario?.nombreUsuario || '?'}${soyYo?' (tú)':''}</span>
          <span class="ranking-nivel">Nv.${r.nivel}</span>
          <span class="ranking-xp">${r.xp} XP</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// Cuando el DOM está listo, renderiza la sección de seguidos y el ranking
// (la sección de resultados se rellena solo cuando el usuario escribe en el buscador)
document.addEventListener('DOMContentLoaded', () => {
  renderizarSiguiendo();
  renderizarRanking();
});
</script>
</body>
</html>
