<body>

  <nav class="sb-nav">

    <a href="perfil.html"   class="nav-elemento" id="navPerfil"><span class="nav-icono">◎</span> Mi Perfil</a>

    <div class="sb-estadistica"><div class="sb-stat-numero" id="stResenas">0</div><div class="sb-stat-etiqueta">Reseñas</div></div>
    <div class="sb-estadistica"><div class="sb-stat-numero" id="stWatchlist">0</div><div class="sb-stat-etiqueta">Watchlist</div></div>

</aside>

<!-- ===================== CONTENIDO PRINCIPAL ===================== -->
<main class="contenido-principal">

  <!-- Topbar con título y contador de entradas del diario -->
  <div class="barra-superior">
    <h2 style="font-family:var(--fuente-display);font-size:22px;font-weight:900;">Mi Diario</h2>
    <!-- El JS rellena este span con el número de entradas, ej: "— 5 entradas" -->
    <span id="contadorDiario" style="font-size:11px;color:var(--apagado);margin-left:8px"></span>
  </div>

  <div class="pagina-contenido">
    <!-- Contenedor vacío donde el JS renderiza la lista de entradas del diario -->
    <div class="diario-lista" id="listaDiario"></div>
  </div>
</main>

<!-- BUG 1 FIX: Se eliminó el <div id="movieModalBg"> vacío del HTML.
     Ahora abrirModal() en ui.js lo crea dinámicamente con todo el contenido. -->

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
// Función principal que construye y renderiza la lista de entradas del diario
function renderizarDiario() {
  const usuario = AUTENTICACION.obtenerUsuarioActual();
  const lista   = document.getElementById('listaDiario');

  // Si no hay sesión, muestra mensaje de acceso restringido
  if (!usuario) {
    lista.innerHTML = `<div class="vacio"><div class="vacio-icono">🔒</div><div class="vacio-titulo">Inicia sesión</div><p class="vacio-texto"><a href="login.html">Inicia sesión</a> para ver tu diario</p></div>`;
    return;
  }

  const datos = AUTENTICACION.obtenerDatosUsuario(usuario.nombreUsuario);
  // Ordena las entradas de más reciente a más antigua por fecha
  const ordenadas = [...datos.diario].sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

  // Actualiza el contador de entradas en el topbar
  document.getElementById('contadorDiario').textContent = `— ${ordenadas.length} entradas`;

  // Si el diario está vacío, muestra un estado vacío con instrucciones
  if (ordenadas.length === 0) {
    lista.innerHTML = `<div class="vacio"><div class="vacio-icono">📓</div><div class="vacio-titulo">Tu diario está vacío</div><p class="vacio-texto">Haz clic en una película → "Añadir al diario"</p></div>`;
    return;
  }

  // Construye el HTML de cada entrada del diario
  lista.innerHTML = ordenadas.map(e => {
    const pelicula = PELICULAS.find(mv => mv.id === e.idPelicula);
    if (!pelicula) return ''; // Si la película no existe en el catálogo, omite la entrada

    // Formatea la fecha en español: ej. "15 de marzo de 2024"
    // El T00:00:00 evita problemas de zona horaria al parsear la fecha
    const fechaFormateada = new Date(e.fecha+'T00:00:00').toLocaleDateString('es-ES', {year:'numeric',month:'long',day:'numeric'});

    // La puntuación del usuario está en vistas[], no en el diario
    const entradaVista = datos.vistas.find(v => v.idPelicula === e.idPelicula);
    const puntuacion   = entradaVista?.puntuacion || null;

    return `<div class="diario-item" id="entrada-${e.id}">
      <!-- Miniatura del póster: al hacer click abre el modal de la película -->
      <img class="diario-miniatura" src="${pelicula.imagen}" alt="${pelicula.titulo}" onclick="abrirModal(${pelicula.id})" style="cursor:pointer" />
      <div style="flex:1;min-width:0">
        <!-- Título clicable que abre el modal -->
        <p class="di-titulo" onclick="abrirModal(${pelicula.id})" style="cursor:pointer">
          ${pelicula.titulo} <span style="font-size:11px;color:var(--apagado);font-weight:400">${pelicula.anio}</span>
        </p>
        <p class="di-fecha">📅 ${fechaFormateada}</p>
        <!-- Muestra la reseña si existe, o un texto en cursiva si la entrada no tiene reseña -->
        ${e.resena ? `<p class="di-texto">${e.resena}</p>` : '<p class="di-texto" style="color:var(--apagado);font-style:italic">Sin reseña</p>'}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
        <!-- Puntuación del usuario si ha valorado la película -->
        ${puntuacion ? `<div class="di-puntuacion">${puntuacion}/10</div>` : ''}
        <!-- Botón para editar esta entrada del diario -->
        <button onclick="editarEntrada(${e.id})" title="Editar entrada" style="
          padding:4px 8px;border-radius:var(--radio-peq);border:1px solid var(--borde2);
          background:transparent;color:var(--apagado);font-size:11px;cursor:pointer;
          white-space:nowrap">✏️ Editar</button>
      </div>
    </div>`;
  }).join('');
}

// ─ Editar entrada de diario ─
// Sustituye el HTML de una entrada por un formulario de edición inline
function editarEntrada(idEntrada) {
  const usuario = AUTENTICACION.obtenerUsuarioActual(); if (!usuario) return;
  const datos   = AUTENTICACION.obtenerDatosUsuario(usuario.nombreUsuario);
  const entrada = datos.diario.find(x => x.id === idEntrada);
  if (!entrada) return;

  const contenedor = document.getElementById(`entrada-${idEntrada}`);
  if (!contenedor) return;

  // Guarda el HTML original de la entrada para poder restaurarlo si el usuario cancela
  const htmlOriginal = contenedor.innerHTML;

  // Reemplaza el contenido de la entrada con el formulario de edición
  contenedor.innerHTML = `
    <div style="flex:1;padding:4px 0">
      <p style="font-family:var(--fuente-ui);font-size:11px;font-weight:700;color:var(--acento-claro);margin-bottom:10px">
        Editando entrada
      </p>
      <div style="margin-bottom:10px">
        <label style="font-size:10px;color:var(--apagado);display:block;margin-bottom:4px">Fecha de visionado</label>
        <!-- Precarga la fecha actual de la entrada en el input -->
        <input type="date" id="editFecha-${idEntrada}" class="campo-entrada" value="${entrada.fecha}" style="max-width:180px" />
      </div>
      <div style="margin-bottom:12px">
        <label style="font-size:10px;color:var(--apagado);display:block;margin-bottom:4px">Reseña (opcional)</label>
        <!-- Precarga el texto de la reseña actual en el textarea -->
        <textarea id="editTexto-${idEntrada}" class="campo-entrada campo-textarea" rows="3"
          placeholder="¿Qué te pareció?">${entrada.resena || ''}</textarea>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="guardarEdicion(${idEntrada})" class="btn-guardar">Guardar cambios</button>
        <!-- Pasa el HTML original codificado para poder restaurarlo al cancelar -->
        <button onclick="cancelarEdicion(${idEntrada}, \`${encodeURIComponent(htmlOriginal)}\`)" class="btn-cancelar">Cancelar</button>
      </div>
    </div>`;
}

// Guarda los cambios de la entrada editada en localStorage y re-renderiza el diario
function guardarEdicion(idEntrada) {
  const usuario = AUTENTICACION.obtenerUsuarioActual(); if (!usuario) return;
  const fecha   = document.getElementById(`editFecha-${idEntrada}`)?.value;
  const texto   = document.getElementById(`editTexto-${idEntrada}`)?.value.trim();
  // La fecha es obligatoria, la reseña es opcional
  if (!fecha) { notificacion('La fecha es obligatoria', 'err'); return; }

  let datos = AUTENTICACION.obtenerDatosUsuario(usuario.nombreUsuario);
  const idx = datos.diario.findIndex(x => x.id === idEntrada);
  if (idx < 0) return;
  // Actualiza solo la fecha y la reseña, sin tocar el resto de datos de la entrada
  datos.diario[idx].fecha  = fecha;
  datos.diario[idx].resena = texto || '';
  AUTENTICACION.guardarDatosUsuario(usuario.nombreUsuario, datos);
  notificacion('✓ Entrada actualizada');
  // Re-renderiza toda la lista para reflejar los cambios
  renderizarDiario();
}

// Restaura el HTML original de la entrada cancelando la edición
function cancelarEdicion(idEntrada, htmlCodificado) {
  const contenedor = document.getElementById(`entrada-${idEntrada}`);
  // decodeURIComponent deshace la codificación aplicada al guardar el HTML original
  if (contenedor) contenedor.innerHTML = decodeURIComponent(htmlCodificado);
}

// Expone renderizarDiario como refrescarGrid para que ui.js pueda refrescar el diario
// después de acciones en el modal (marcar vista, añadir entrada, etc.)
refrescarGrid = renderizarDiario;

// Espera a que el DOM esté listo antes de renderizar el diario e inicializar el sidebar
document.addEventListener('DOMContentLoaded', renderizarDiario);
</script>
</body>
</html>
