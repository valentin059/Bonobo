<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BONOBO — Mi Perfil</title>
    <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

    <header id="nav-placeholder"></header>

    <main class="contenedor pagina">

        <!-- ── CABECERA DEL PERFIL ──────────────────────────────────────── -->
        <div class="perfil-cabecera" id="perfilCabecera">

            <div class="perfil-top">
                <!-- Avatar -->
                <div class="perfil-avatar perfil-avatar--placeholder" id="perfilAvatar">?</div>

                <div class="perfil-datos">
                    <h1 class="perfil-username" id="perfilUsername">—</h1>
                    <p class="perfil-bio" id="perfilBio"></p>

                    <!-- Estadísticas: vistas · seguidores · seguidos -->
                    <div class="perfil-stats">
                        <div class="perfil-stat">
                            <div class="perfil-stat__num" id="statVistas">0</div>
                            <div class="perfil-stat__label">Vistas</div>
                        </div>
                        <div class="perfil-stat">
                            <div class="perfil-stat__num" id="statSeguidores">0</div>
                            <div class="perfil-stat__label">Seguidores</div>
                        </div>
                        <div class="perfil-stat">
                            <div class="perfil-stat__num" id="statSeguidos">0</div>
                            <div class="perfil-stat__label">Siguiendo</div>
                        </div>
                    </div>
                </div>

                <!-- Botón de editar (solo en perfil propio) -->
                <button class="btn btn--ghost btn--sm" id="btnEditarPerfil" onclick="abrirModalEditar()">
                    Editar perfil
                </button>
            </div>

            <!-- Películas favoritas (hasta 4 pósters) -->
            <div>
                <p style="font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">
                    Películas favoritas
                </p>
                <div class="favoritas-grid" id="favoritasGrid">
                    <!-- Se rellena por JS. Cada slot vacío muestra un + -->
                </div>
            </div>

        </div>

        <!-- ── PELÍCULAS VISTAS ──────────────────────────────────────────── -->
        <section class="seccion">
            <div class="seccion-header">
                <h2 class="seccion-titulo">Películas vistas</h2>
                <div class="seccion-linea"></div>
                <span class="seccion-meta" id="lblVistas"></span>
            </div>
            <div class="peliculas-grid" id="gridVistas"></div>
        </section>

        <!-- ── DIARIO RECIENTE ───────────────────────────────────────────── -->
        <section class="seccion">
            <div class="seccion-header">
                <h2 class="seccion-titulo">Diario reciente</h2>
                <div class="seccion-linea"></div>
                <a href="diario.html" class="seccion-meta" style="color:var(--accent)">Ver todo →</a>
            </div>
            <div class="diario-lista" id="listaDiario"></div>
        </section>

    </main>

    <!-- ── MODAL: EDITAR PERFIL ─────────────────────────────────────────── -->
    <div class="modal-overlay modal-overlay--hidden" id="modalEditar">
        <div class="modal">
            <button class="modal-close" onclick="cerrarModalEditar()">✕</button>
            <h2 class="modal-titulo">Editar perfil</h2>

            <div class="form-grupo">
                <label class="form-label">URL del avatar</label>
                <input class="form-input" type="url" id="inputAvatar" placeholder="https://…" />
            </div>
            <div class="form-grupo">
                <label class="form-label">Biografía</label>
                <input class="form-input" type="text" id="inputBio" placeholder="Cuéntanos algo…" maxlength="200" />
            </div>

            <p class="form-error" id="errorEditar"></p>

            <button class="btn btn--primary" style="width:100%;margin-top:8px" onclick="guardarPerfil()">
                Guardar cambios
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/perfil.js"></script>

</body>
</html>
