<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BONOBO — Mi Diario</title>
    <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

    <header id="nav-placeholder"></header>

    <main class="contenedor pagina">

        <div class="seccion-header" style="margin-bottom:32px">
            <h1 class="seccion-titulo">Mi Diario</h1>
            <div class="seccion-linea"></div>
            <span class="seccion-meta" id="lblTotal"></span>
        </div>

        <div class="diario-lista" id="listaDiario"></div>

        <div style="text-align:center;margin-top:32px">
            <button class="btn btn--ghost oculto" id="btnMas" onclick="cargarMas()">
                Cargar más
            </button>
        </div>

    </main>

    <!-- ── MODAL: EDITAR ENTRADA ─────────────────────────────────────────── -->
    <div class="modal-overlay modal-overlay--hidden" id="modalEditar">
        <div class="modal">
            <button class="modal-close" onclick="cerrarModalEditar()">✕</button>
            <h2 class="modal-titulo">Editar entrada</h2>

            <input type="hidden" id="editIdEntrada" />

            <div class="form-grupo">
                <label class="form-label">Fecha de visionado</label>
                <input class="form-input" type="date" id="editFecha" style="color-scheme:dark" />
            </div>
            <div class="form-grupo">
                <label class="form-label">Puntuación del visionado</label>
                <div class="puntuacion-selector" id="editSelectorPuntuacion"></div>
            </div>
            <div class="form-grupo">
                <label class="form-label">Reseña</label>
                <textarea class="form-input" id="editResena" rows="4"
                          placeholder="¿Qué te pareció? (opcional)"
                          maxlength="5000"
                          style="resize:vertical;min-height:90px"></textarea>
            </div>

            <p class="form-error" id="errorEditar"></p>

            <button class="btn btn--primary" style="width:100%;margin-top:8px"
                    onclick="guardarEdicion()">
                Guardar cambios
            </button>
        </div>
    </div>

    <!-- ── MODAL: VER ENTRADA (solo lectura, modo ajeno) ───────────────────── -->
    <div class="modal-overlay modal-overlay--hidden" id="modalVerEntrada">
        <div class="modal">
            <button class="modal-close" onclick="cerrarModalVerEntrada()">✕</button>
            <h2 class="modal-titulo" id="verEntradaTitulo">Entrada del diario</h2>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
                <span id="verEntradaFecha" style="font-size:13px;color:var(--muted)"></span>
                <span id="verEntradaPuntuacion" style="font-size:13px;font-weight:600;color:var(--accent)"></span>
            </div>
            <p id="verEntradaResena" style="font-size:14px;line-height:1.7;color:var(--muted);white-space:pre-wrap"></p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script>
        let skip     = 0;
        const LIMIT  = 20;
        let movieMap    = {};
        let usuarioId   = null;
        let modoAjeno   = false;
        const entradas$ = {};

        function mostrarToast(msg, tipo = 'ok') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast toast--${tipo} toast--visible`;
            setTimeout(() => { t.className = 'toast'; }, 2800);
        }

        async function construirMovieMap() {
            try {
                const vistas = await api.usuarios.vistas(usuarioId, 0, 200);
                vistas.forEach(v => { movieMap[v.id_pelicula] = v.pelicula; });
            } catch { /* no crítico */ }
        }

        function crearEntradaHTML(entrada) {
            entradas$[entrada.id] = { entrada, pelicula: movieMap[entrada.id_pelicula] };
            const fecha = new Date(entrada.fecha_visionado);
            const dia   = fecha.getDate();
            const mes   = fecha.toLocaleString('es', { month: 'short' }).toUpperCase();
            const anio  = fecha.getFullYear();
            const pelicula = movieMap[entrada.id_pelicula];

            return `
                <div class="diario-entrada" id="entrada-${entrada.id}">
                    <div class="diario-fecha">
                        <div class="diario-fecha__dia">${dia}</div>
                        <div class="diario-fecha__mes">${mes}</div>
                        <div class="diario-fecha__mes">${anio}</div>
                    </div>
                    ${pelicula?.poster_url
                        ? `<div class="diario-poster" style="cursor:pointer"
                               onclick="location.href='pelicula.html?id=${pelicula.tmdb_id}'">
                               <img src="${pelicula.poster_url}" alt="">
                           </div>`
                        : `<div class="diario-poster"></div>`
                    }
                    <div class="diario-contenido diario-contenido--clickable"
                         onclick="${modoAjeno ? `abrirModalVerEntrada(${entrada.id})` : `abrirModalEditar(${entrada.id})`}">
                        <div class="diario-titulo-peli">
                            ${escapeHTML(pelicula?.titulo) || `Entrada #${entrada.id}`}
                            <span class="diario-puntuacion" id="punt-${entrada.id}">${entrada.puntuacion ? `★ ${entrada.puntuacion}` : ''}</span>
                        </div>
                        <p class="diario-resena" id="resena-txt-${entrada.id}">${
                            entrada.resena
                                ? escapeHTML(entrada.resena)
                                : '<span class="text-faint">Sin reseña</span>'
                        }</p>
                    </div>
                </div>
            `;
        }

        async function cargarEntradas() {
            try {
                const entradas = await api.usuarios.diario(usuarioId, skip, LIMIT);

                if (skip === 0 && entradas.length === 0) {
                    document.getElementById('listaDiario').innerHTML = `
                        <div class="estado-vacio">
                            <p class="estado-vacio__titulo">Tu diario está vacío</p>
                            <p class="estado-vacio__desc">Añade películas desde su ficha para que aparezcan aquí.</p>
                        </div>
                    `;
                    return;
                }

                const lista = document.getElementById('listaDiario');
                lista.insertAdjacentHTML('beforeend', entradas.map(crearEntradaHTML).join(''));

                document.getElementById('btnMas').classList.toggle('oculto', entradas.length < LIMIT);
                skip += entradas.length;

            } catch {
                mostrarToast('Error al cargar el diario', 'error');
            }
        }

        function cargarMas() { cargarEntradas(); }

        // ── Modal editar entrada ──────────────────────────────────────────

        let editPuntuacion = null;

        function initEditSelector() {
            const sel = document.getElementById('editSelectorPuntuacion');
            if (sel.innerHTML) return;
            sel.innerHTML = Array.from({ length: 10 }, (_, i) => {
                const v = i + 1;
                return `<button class="punt-btn" data-val="${v}" onclick="setEditPuntuacion(${v})">${v}</button>`;
            }).join('');
        }

        function setEditPuntuacion(val) {
            editPuntuacion = editPuntuacion === val ? null : val;
            document.querySelectorAll('#editSelectorPuntuacion .punt-btn').forEach(btn => {
                btn.classList.toggle('punt-btn--activo', parseInt(btn.dataset.val) === editPuntuacion);
            });
        }

        function abrirModalEditar(id) {
            const cached = entradas$[id];
            if (!cached) return;
            const e = cached.entrada || cached;
            initEditSelector();
            document.getElementById('editIdEntrada').value = e.id;
            document.getElementById('editFecha').value    = e.fecha_visionado;
            document.getElementById('editResena').value   = e.resena || '';
            document.getElementById('errorEditar').className = 'form-error';
            editPuntuacion = e.puntuacion || null;
            document.querySelectorAll('#editSelectorPuntuacion .punt-btn').forEach(btn => {
                btn.classList.toggle('punt-btn--activo', parseInt(btn.dataset.val) === editPuntuacion);
            });
            document.getElementById('modalEditar').classList.remove('modal-overlay--hidden');
        }

        function cerrarModalEditar() {
            document.getElementById('modalEditar').classList.add('modal-overlay--hidden');
        }

        async function guardarEdicion() {
            const idEntrada = parseInt(document.getElementById('editIdEntrada').value);
            const fecha     = document.getElementById('editFecha').value;
            const resena    = document.getElementById('editResena').value.trim() || null;
            const errorEl   = document.getElementById('errorEditar');

            if (!fecha) {
                errorEl.textContent = 'La fecha es obligatoria';
                errorEl.className = 'form-error form-error--visible';
                return;
            }

            try {
                await api.acciones.editarDiario(idEntrada, {
                    fecha_visionado: fecha,
                    resena,
                    puntuacion: editPuntuacion,
                });

                if (entradas$[idEntrada]?.entrada) {
                    entradas$[idEntrada].entrada.resena     = resena;
                    entradas$[idEntrada].entrada.puntuacion = editPuntuacion;
                }
                const resenaTxt = document.getElementById(`resena-txt-${idEntrada}`);
                if (resenaTxt) {
                    resenaTxt.innerHTML = resena
                        ? escapeHTML(resena)
                        : '<span class="text-faint">Sin reseña</span>';
                }
                const puntEl = document.getElementById(`punt-${idEntrada}`);
                if (puntEl) puntEl.textContent = editPuntuacion ? `★ ${editPuntuacion}` : '';

                cerrarModalEditar();
                mostrarToast('Entrada actualizada ✓');
            } catch (err) {
                errorEl.textContent = err.message || 'Error al guardar';
                errorEl.className = 'form-error form-error--visible';
            }
        }

        function abrirModalVerEntrada(id) {
            const cached = entradas$[id];
            if (!cached) return;
            const { entrada, pelicula } = typeof cached === 'object' && 'entrada' in cached
                ? cached
                : { entrada: cached, pelicula: movieMap[cached.id_pelicula] };
            const fecha = new Date(entrada.fecha_visionado).toLocaleDateString('es', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            document.getElementById('verEntradaTitulo').textContent     = pelicula?.titulo || 'Entrada del diario';
            document.getElementById('verEntradaFecha').textContent      = fecha;
            document.getElementById('verEntradaPuntuacion').textContent = entrada.puntuacion ? `★ ${entrada.puntuacion}` : '';
            document.getElementById('verEntradaResena').textContent     = entrada.resena || '';
            document.getElementById('modalVerEntrada').classList.remove('modal-overlay--hidden');
        }

        function cerrarModalVerEntrada() {
            document.getElementById('modalVerEntrada').classList.add('modal-overlay--hidden');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            renderNav('../');

            const params  = new URLSearchParams(window.location.search);
            const idParam = parseInt(params.get('id'));
            modoAjeno     = !!idParam;

            if (!modoAjeno && !auth.estaLogueado()) {
                window.location.href = 'login.html';
                return;
            }

            if (modoAjeno) {
                usuarioId = idParam;
                try {
                    const u = await api.usuarios.perfil(idParam);
                    document.title = `BONOBO — Diario de ${u.username}`;
                    document.querySelector('.seccion-titulo').textContent = `Diario de ${u.username}`;
                } catch { /* cargamos igual */ }
            } else {
                const usuario = await api.usuarios.mePerfil();
                usuarioId = usuario.id;
            }

            await construirMovieMap();
            cargarEntradas();
        });
    </script>

</body>
</html>
