<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BONOBO — Mi Diario</title>
    <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

    <header id="nav-placeholder"></header>

    <main class="contenedor pagina">

        <div class="seccion-header" style="margin-bottom:32px">
            <h1 class="seccion-titulo">Mi Diario</h1>
            <div class="seccion-linea"></div>
            <span class="seccion-meta" id="lblTotal"></span>
        </div>

        <div class="diario-lista" id="listaDiario"></div>

        <div style="text-align:center;margin-top:32px">
            <button class="btn btn--ghost oculto" id="btnMas" onclick="cargarMas()">
                Cargar más
            </button>
        </div>

    </main>

    <!-- ── MODAL: EDITAR ENTRADA ─────────────────────────────────────────── -->
    <div class="modal-overlay modal-overlay--hidden" id="modalEditar">
        <div class="modal">
            <button class="modal-close" onclick="cerrarModalEditar()">✕</button>
            <h2 class="modal-titulo">Editar entrada</h2>

            <input type="hidden" id="editIdEntrada" />

            <div class="form-grupo">
                <label class="form-label">Fecha de visionado</label>
                <input class="form-input" type="date" id="editFecha" style="color-scheme:dark" />
            </div>
            <div class="form-grupo">
                <label class="form-label">Reseña</label>
                <textarea class="form-input" id="editResena" rows="4"
                          placeholder="¿Qué te pareció? (opcional)"
                          style="resize:vertical;min-height:90px"></textarea>
            </div>

            <p class="form-error" id="errorEditar"></p>

            <button class="btn btn--primary" style="width:100%;margin-top:8px"
                    onclick="guardarEdicion()">
                Guardar cambios
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script>
        let skip     = 0;
        const LIMIT  = 20;
        let movieMap = {};
        let usuarioId = null;

        function mostrarToast(msg, tipo = 'ok') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast toast--${tipo} toast--visible`;
            setTimeout(() => { t.className = 'toast'; }, 2800);
        }

        async function construirMovieMap() {
            try {
                const vistas = await api.usuarios.vistas(usuarioId, 0, 200);
                vistas.forEach(v => { movieMap[v.id_pelicula] = v.pelicula; });
            } catch { /* no crítico */ }
        }

        function crearEntradaHTML(entrada) {
            const fecha = new Date(entrada.fecha_visionado);
            const dia   = fecha.getDate();
            const mes   = fecha.toLocaleString('es', { month: 'short' }).toUpperCase();
            const anio  = fecha.getFullYear();
            const pelicula = movieMap[entrada.id_pelicula];

            return `
                <div class="diario-entrada" id="entrada-${entrada.id}">
                    <div class="diario-fecha">
                        <div class="diario-fecha__dia">${dia}</div>
                        <div class="diario-fecha__mes">${mes}</div>
                        <div class="diario-fecha__mes">${anio}</div>
                    </div>
                    ${pelicula?.poster_url
                        ? `<div class="diario-poster" style="cursor:pointer"
                               onclick="location.href='pelicula.html?id=${pelicula.tmdb_id}'">
                               <img src="${pelicula.poster_url}" alt="">
                           </div>`
                        : `<div class="diario-poster"></div>`
                    }
                    <div class="diario-contenido">
                        <div class="diario-titulo-peli"
                             ${pelicula ? `style="cursor:pointer" onclick="location.href='pelicula.html?id=${pelicula.tmdb_id}'"` : ''}>
                            ${pelicula?.titulo || `Entrada #${entrada.id}`}
                        </div>
                        <p class="diario-resena" id="resena-txt-${entrada.id}">${
                            entrada.resena
                                ? entrada.resena
                                : '<span class="text-faint">Sin reseña</span>'
                        }</p>
                    </div>
                    <div class="diario-acciones">
                        <button class="diario-accion-btn"
                                onclick="abrirModalEditar(${entrada.id}, '${entrada.fecha_visionado}', ${JSON.stringify(entrada.resena || '')})">
                            Editar
                        </button>
                    </div>
                </div>
            `;
        }

        async function cargarEntradas() {
            try {
                const entradas = await api.usuarios.diario(usuarioId, skip, LIMIT);

                if (skip === 0 && entradas.length === 0) {
                    document.getElementById('listaDiario').innerHTML = `
                        <div class="estado-vacio">
                            <p class="estado-vacio__titulo">Tu diario está vacío</p>
                            <p class="estado-vacio__desc">Añade películas desde su ficha para que aparezcan aquí.</p>
                        </div>
                    `;
                    return;
                }

                const lista = document.getElementById('listaDiario');
                lista.insertAdjacentHTML('beforeend', entradas.map(crearEntradaHTML).join(''));

                document.getElementById('btnMas').classList.toggle('oculto', entradas.length < LIMIT);
                skip += entradas.length;

            } catch {
                mostrarToast('Error al cargar el diario', 'error');
            }
        }

        function cargarMas() { cargarEntradas(); }

        // ── Modal editar entrada ──────────────────────────────────────────

        function abrirModalEditar(idEntrada, fecha, resena) {
            document.getElementById('editIdEntrada').value = idEntrada;
            document.getElementById('editFecha').value    = fecha;
            document.getElementById('editResena').value   = resena || '';
            document.getElementById('errorEditar').className = 'form-error';
            document.getElementById('modalEditar').classList.remove('modal-overlay--hidden');
        }

        function cerrarModalEditar() {
            document.getElementById('modalEditar').classList.add('modal-overlay--hidden');
        }

        async function guardarEdicion() {
            const idEntrada = parseInt(document.getElementById('editIdEntrada').value);
            const fecha     = document.getElementById('editFecha').value;
            const resena    = document.getElementById('editResena').value.trim() || null;
            const errorEl   = document.getElementById('errorEditar');

            if (!fecha) {
                errorEl.textContent = 'La fecha es obligatoria';
                errorEl.className = 'form-error form-error--visible';
                return;
            }

            try {
                await api.acciones.editarDiario(idEntrada, {
                    fecha_visionado: fecha,
                    resena
                });

                // actualiza el texto en el DOM sin recargar
                const resenaTxt = document.getElementById(`resena-txt-${idEntrada}`);
                if (resenaTxt) {
                    resenaTxt.innerHTML = resena
                        ? resena
                        : '<span class="text-faint">Sin reseña</span>';
                }

                cerrarModalEditar();
                mostrarToast('Entrada actualizada ✓');
            } catch (err) {
                errorEl.textContent = err.message || 'Error al guardar';
                errorEl.className = 'form-error form-error--visible';
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            renderNav('../');

            if (!auth.estaLogueado()) {
                window.location.href = 'login.html';
                return;
            }

            const usuario = await api.usuarios.mePerfil();
            usuarioId = usuario.id;

            await construirMovieMap();
            cargarEntradas();
        });
    </script>

</body>
</html>
