</aside>

<!-- ===================== CONTENIDO PRINCIPAL ===================== -->
<main class="contenido-principal">
  <div class="barra-superior">
    <h2 style="font-family:var(--fuente-display);font-size:22px;font-weight:900;letter-spacing:-.3px;">Editar Perfil</h2>
  </div>
  <!-- max-width:520px limita el formulario a un ancho cómodo para editar -->
  <div class="pagina-contenido" style="max-width:520px">
    <!-- Contenedor vacío que el JS rellena con el formulario de edición -->
    <div id="contenidoEdicion"></div>
  </div>
</main>

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/ui.js"></script>
<script>
// Variable global que almacena la URL o dataURL de la foto nueva mientras se edita
// null significa que no se ha cambiado el avatar
let previstaDataUrl = null;

// Construye y renderiza el formulario de edición de perfil
function renderizarFormularioEdicion() {
  const usuario = AUTENTICACION.obtenerUsuarioActual();
  const el      = document.getElementById('contenidoEdicion');

  // Si no hay sesión, muestra acceso restringido
  if (!usuario) {
    el.innerHTML = `<div class="vacio"><div class="vacio-icono">🔒</div>
      <div class="vacio-titulo">Acceso restringido</div>
      <p class="vacio-texto"><a href="login.html">Inicia sesión</a> para editar tu perfil</p></div>`;
    return;
  }

  const datos = AUTENTICACION.obtenerDatosUsuario(usuario.nombreUsuario);
  // Obtiene el avatar actual del objeto usuario o de sus datos personales
  const av    = usuario.avatar || datos.avatar;

  el.innerHTML = `
    <div style="background:var(--superficie);border:1px solid var(--borde);border-radius:var(--radio);padding:28px;display:flex;flex-direction:column;gap:22px;">

      <!-- ── SECCIÓN DE AVATAR ── -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:14px;">
        <!-- Vista previa circular del avatar — clicable para abrir el posicionador -->
        <div id="vistaAvatar" style="
          width:96px;height:96px;border-radius:50%;background:var(--superficie2);
          border:2px solid var(--borde2);display:flex;align-items:center;justify-content:center;
          font-size:36px;font-family:var(--fuente-display);color:var(--acento);
          overflow:hidden;background-size:cover;background-position:center;
          ${av ? `background-image:url(${av})` : ''}">
          <!-- Muestra la imagen de fondo si tiene avatar, o la inicial si no -->
          ${av ? '' : usuario.nombreUsuario[0].toUpperCase()}
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
          <!-- Botón para subir una imagen desde el disco local -->
          <!-- El label actúa como botón y activa el input file oculto al hacer click -->
          <label class="btn-subir-foto" style="cursor:pointer">
            📷 Subir foto desde PC
            <input type="file" id="inputArchivo" accept="image/*" style="display:none" onchange="manejarSubidaArchivo(event)" />
          </label>
          <!-- Botón para mostrar/ocultar el campo de URL -->
          <button onclick="mostrarInputUrl()" style="
            padding:8px 14px;border-radius:var(--radio-peq);border:1px solid var(--borde2);
            background:transparent;color:var(--tenue);font-size:12px;cursor:pointer">
            🔗 Usar URL
          </button>
        </div>
        <!-- Campo para introducir una URL de imagen — oculto por defecto -->
        <div id="areaInputUrl" style="display:none;width:100%">
          <!-- Precarga la URL actual si el avatar es una URL (no una imagen subida) -->
          <input type="url" id="urlAvatar" class="campo-entrada" placeholder="https://ejemplo.com/foto.jpg"
            value="${av && !av.startsWith('data:') ? av : ''}" />
          <button onclick="previsualizarUrl()" style="
            margin-top:8px;padding:8px 14px;border-radius:var(--radio-peq);
            background:var(--acento-fondo);border:1px solid var(--acento);
            color:var(--acento-claro);font-size:12px;cursor:pointer;width:100%">
            Vista previa URL
          </button>
        </div>
        <p style="font-size:10px;color:var(--apagado);text-align:center">
          La foto se guarda localmente en tu navegador.
        </p>
      </div>

      <!-- ── SECCIÓN DE BIO ── -->
      <div>
        <label style="display:block;font-size:10px;color:var(--apagado);font-family:var(--fuente-ui);
          letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px">Biografía</label>
        <!-- Precarga la bio actual del usuario si ya tiene una -->
        <textarea id="inputBio" class="campo-entrada campo-textarea" rows="3"
          placeholder="Cuéntanos algo sobre ti y tu relación con el cine…"
          style="resize:vertical">${usuario.bio || ''}</textarea>
        <p style="font-size:10px;color:var(--apagado);margin-top:4px">Opcional · máx. 300 caracteres</p>
      </div>

      <!-- ── SECCIÓN DE PELÍCULAS FAVORITAS ── -->
      <div>
        <label style="display:block;font-size:10px;color:var(--apagado);font-family:var(--fuente-ui);
          letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px">
          Películas favoritas <span style="color:var(--apagado);font-weight:400">(máx. 4)</span>
        </label>

        <!-- Grid de 4 huecos para las favoritas — el JS los rellena con renderizarHuecosFavoritas() -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px" id="huecosFavoritas"></div>

        <!-- Buscador de películas para añadir a favoritas -->
        <div style="position:relative">
          <input type="text" id="buscadorFavoritas" class="campo-entrada"
            placeholder="Buscar película para añadir…"
            oninput="buscarPeliculasFavoritas(this.value)"
            style="width:100%" />
          <!-- Dropdown de resultados: aparece debajo del input al escribir -->
          <div id="resultadosFavoritas" style="
            display:none;position:absolute;top:100%;left:0;right:0;z-index:50;
            background:var(--superficie);border:1px solid var(--borde2);
            border-radius:var(--radio-peq);margin-top:4px;max-height:220px;overflow-y:auto">
          </div>
        </div>
        <p style="font-size:10px;color:var(--apagado);margin-top:6px">
          Haz clic en ✕ para quitar · Busca y haz clic para añadir
        </p>
      </div>

      <!-- ── BOTONES GUARDAR Y CANCELAR ── -->
      <div style="display:flex;gap:10px">
        <button onclick="guardarPerfil()" style="
          flex:1;padding:12px;border-radius:var(--radio-peq);border:none;
          background:var(--acento);color:#fff;font-family:var(--fuente-ui);
          font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer">
          Guardar cambios
        </button>
        <!-- Cancelar vuelve al perfil sin guardar nada -->
        <a href="perfil.html" style="
          padding:12px 18px;border-radius:var(--radio-peq);border:1px solid var(--borde2);
          color:var(--tenue);font-size:12px;font-family:var(--fuente-ui);font-weight:700;
          text-transform:uppercase;letter-spacing:1px;text-align:center;text-decoration:none">
          Cancelar
        </a>
      </div>
    </div>`;
}

// Gestiona la subida de una imagen desde el disco local del usuario
function manejarSubidaArchivo(evento) {
  const archivo = evento.target.files[0];
  if (!archivo) return;
  // Limita el tamaño máximo a 2 MB para no saturar el localStorage
  if (archivo.size > 2 * 1024 * 1024) {
    notificacion('La imagen no debe superar 2 MB', 'err'); return;
  }
  // FileReader convierte el archivo en una dataURL (base64) para guardarlo en localStorage
  const lector = new FileReader();
  lector.onload = function(e) {
    previstaDataUrl = e.target.result;
    // Actualiza la vista previa circular con la nueva imagen
    const vista = document.getElementById('vistaAvatar');
    vista.style.backgroundImage    = `url(${previstaDataUrl})`;
    vista.style.backgroundSize     = 'cover';
    vista.style.backgroundPosition = 'center';
    vista.textContent = ''; // Elimina la inicial que había si no tenía foto
    notificacion('📷 Foto cargada — guarda para confirmar');
  };
  lector.readAsDataURL(archivo);
}

// Muestra u oculta el campo de introducción de URL de avatar
function mostrarInputUrl() {
  const el = document.getElementById('areaInputUrl');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

// Aplica la URL introducida como vista previa del avatar sin guardar aún
function previsualizarUrl() {
  const url = document.getElementById('urlAvatar')?.value.trim();
  if (!url) return;
  previstaDataUrl = url;
  const vista = document.getElementById('vistaAvatar');
  vista.style.backgroundImage    = `url(${url})`;
  vista.style.backgroundSize     = 'cover';
  vista.style.backgroundPosition = 'center';
  vista.textContent = '';
  notificacion('Vista previa actualizada');
}

// Guarda todos los cambios del perfil: avatar, bio, posición del avatar y favoritas
function guardarPerfil() {
  const usuario = AUTENTICACION.obtenerUsuarioActual(); if (!usuario) return;
  // Recorta la bio a 300 caracteres máximo
  const bio = document.getElementById('inputBio')?.value.trim().substring(0, 300);
  // Usa la nueva imagen si se ha subido/introducido, o null si no se ha cambiado
  const av  = previstaDataUrl || document.getElementById('urlAvatar')?.value.trim() || null;

  // Actualiza bio y avatar en los datos del usuario
  AUTENTICACION.actualizarPerfil(usuario.nombreUsuario, { bio: bio ?? usuario.bio, avatar: av });

  // Guarda la posición del avatar si fue ajustada con el posicionador
  // window._posAvatar es establecida por aplicarPosAvatar()
  if (window._posAvatar) {
    const usuarios = AUTENTICACION.obtenerUsuarios();
    const idx      = usuarios.findIndex(u => u.nombreUsuario === usuario.nombreUsuario);
    if (idx >= 0) { usuarios[idx].posAvatar = window._posAvatar; AUTENTICACION.guardarUsuarios(usuarios); }
    const datos = AUTENTICACION.obtenerDatosUsuario(usuario.nombreUsuario);
    datos.posAvatar = window._posAvatar;
    AUTENTICACION.guardarDatosUsuario(usuario.nombreUsuario, datos);
  }

  // Guarda las películas favoritas seleccionadas en el editor
  if (datosFavoritas.length >= 0) {
    let datos = AUTENTICACION.obtenerDatosUsuario(usuario.nombreUsuario);
    datos.favoritas = [...datosFavoritas];
    AUTENTICACION.guardarDatosUsuario(usuario.nombreUsuario, datos);
  }

  notificacion('✓ Perfil guardado');
  // Redirige al perfil tras un breve delay para que el usuario vea la notificación
  setTimeout(() => { window.location.href = 'perfil.html'; }, 800);
}


/* ══════════════════════════════════════════
   GESTIÓN DE FAVORITAS
   ══════════════════════════════════════════ */

// Array local que almacena los IDs de las favoritas mientras se edita
// Se inicializa con las favoritas guardadas y se sincroniza con localStorage al guardar
let datosFavoritas = [];

// Renderiza los 4 huecos de favoritas con las películas actuales o vacíos
function renderizarHuecosFavoritas() {
  const usuario = AUTENTICACION.obtenerUsuarioActual(); if (!usuario) return;
  const datos   = AUTENTICACION.obtenerDatosUsuario(usuario.nombreUsuario);
  // Inicializa datosFavoritas con los datos guardados solo la primera vez (evita sobreescribir cambios pendientes)
  if (datosFavoritas.length === 0 && datos.favoritas.length > 0) {
    datosFavoritas = [...datos.favoritas];
  }
  const contenedor = document.getElementById('huecosFavoritas');
  if (!contenedor) return;

  contenedor.innerHTML = [0,1,2,3].map(i => {
    const idPelicula = datosFavoritas[i];
    const pelicula   = idPelicula ? PELICULAS.find(mv => mv.id === idPelicula) : null;
    if (pelicula) {
      // Hueco ocupado: muestra la imagen de la película con botón ✕ para quitarla
      return `<div style="position:relative;border-radius:var(--radio-peq);overflow:hidden;
          aspect-ratio:2/3;background:var(--superficie2);border:1px solid var(--borde2)">
        <img src="${pelicula.imagen}" alt="${pelicula.titulo}" style="width:100%;height:100%;object-fit:cover" />
        <div style="position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,transparent 50%)"></div>
        <!-- Gradiente oscuro inferior para que el título sea legible -->
        <p style="position:absolute;bottom:4px;left:4px;right:4px;font-size:9px;
          font-family:var(--fuente-ui);font-weight:700;color:#fff;line-height:1.2">${pelicula.titulo}</p>
        <!-- Botón ✕ en la esquina superior derecha para quitar esta favorita -->
        <button onclick="quitarFavorita(${i})" title="Quitar favorita" style="
          position:absolute;top:4px;right:4px;background:rgba(0,0,0,.65);
          border:none;color:#fff;border-radius:50%;width:20px;height:20px;
          font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center">✕</button>
      </div>`;
    }
    // Hueco vacío: placeholder con icono y número de hueco
    return `<div style="border-radius:var(--radio-peq);aspect-ratio:2/3;
        background:var(--superficie2);border:1px dashed var(--borde2);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px">
      <span style="font-size:18px;opacity:.35">⭐</span>
      <span style="font-size:9px;color:var(--apagado)">Hueco ${i+1}</span>
    </div>`;
  }).join('');
}

// Quita una película de las favoritas por su índice en el array y re-renderiza los huecos
function quitarFavorita(indiceHueco) {
  datosFavoritas.splice(indiceHueco, 1);
  renderizarHuecosFavoritas();
}

// Busca películas en el catálogo y muestra un dropdown de resultados para añadir a favoritas
function buscarPeliculasFavoritas(q) {
  const resultados = document.getElementById('resultadosFavoritas');
  if (!resultados) return;
  // Si el campo está vacío, oculta el dropdown
  if (!q.trim()) { resultados.style.display = 'none'; return; }

  // Filtra el catálogo con coincidencia parcial, máximo 8 resultados
  const encontradas = PELICULAS.filter(m => m.titulo.toLowerCase().includes(q.toLowerCase())).slice(0, 8);
  if (!encontradas.length) {
    resultados.style.display = 'block';
    resultados.innerHTML = '<p style="padding:12px;font-size:12px;color:var(--apagado)">Sin resultados</p>';
    return;
  }

  resultados.style.display = 'block';
  resultados.innerHTML = encontradas.map(m => {
    // Detecta si la película ya está en favoritas para mostrarla desactivada
    const yaEsFavorita = datosFavoritas.includes(m.id);
    return `<div onclick="agregarFavorita(${m.id})" style="
        display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;
        transition:background .1s;${yaEsFavorita ? 'opacity:.45;cursor:not-allowed' : ''}">
      <img src="${m.imagen}" style="width:28px;height:42px;object-fit:cover;border-radius:3px;flex-shrink:0" />
      <div>
        <p style="font-size:12px;font-weight:600;color:var(--texto)">${m.titulo}</p>
        <p style="font-size:10px;color:var(--apagado)">${m.anio} · ${m.genero}</p>
      </div>
      <!-- Indicador verde si la película ya es favorita -->
      ${yaEsFavorita ? '<span style="margin-left:auto;font-size:10px;color:var(--verde)">✓ Ya es favorita</span>' : ''}
    </div>`;
  }).join('');

  // Añade efecto hover a cada resultado del dropdown
  resultados.querySelectorAll('div[onclick]').forEach(el => {
    el.addEventListener('mouseenter', () => { el.style.background = 'var(--superficie2)'; });
    el.addEventListener('mouseleave', () => { el.style.background = ''; });
  });
}

// Añade una película a las favoritas desde el dropdown de búsqueda
function agregarFavorita(idPelicula) {
  if (datosFavoritas.includes(idPelicula)) { notificacion('Ya está en tus favoritas', 'inf'); return; }
  // Respeta el límite de 4 favoritas
  if (datosFavoritas.length >= 4) { notificacion('Máximo 4 favoritas. Quita una primero.', 'err'); return; }
  datosFavoritas.push(idPelicula);
  // Limpia el buscador y oculta el dropdown tras añadir
  document.getElementById('buscadorFavoritas').value = '';
  document.getElementById('resultadosFavoritas').style.display = 'none';
  renderizarHuecosFavoritas();
  notificacion('⭐ Añadida a favoritas');
}


/* ══════════════════════════════════════════
   POSICIONADOR DE AVATAR
   Permite al usuario centrar su foto dentro del círculo
   ══════════════════════════════════════════ */

// Variables globales para la posición actual del avatar (en porcentaje)
let posAvatarX = 50;  // % posición horizontal (0=izquierda, 100=derecha)
let posAvatarY = 50;  // % posición vertical (0=arriba, 100=abajo)

// Abre el modal del posicionador de avatar con sliders para ajustar la posición
function abrirPosicionadorAvatar() {
  const vista  = document.getElementById('vistaAvatar');
  const imgSrc = vista.style.backgroundImage;
  // Si no hay imagen cargada, avisa al usuario
  if (!imgSrc || imgSrc === 'none' || imgSrc === '') {
    notificacion('Primero sube o añade una foto', 'inf'); return;
  }

  // Lee la posición actual de la vista previa para inicializar los sliders
  const posStr = vista.style.backgroundPosition || '50% 50%';
  const partes = posStr.split(' ');
  posAvatarX = parseInt(partes[0]) || 50;
  posAvatarY = parseInt(partes[1]) || 50;

  // Crea o reutiliza el overlay del posicionador
  let overlay = document.getElementById('overlayPosAvatar');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'overlayPosAvatar';
    document.body.appendChild(overlay);
  }

  overlay.style.cssText = `
    position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0`;

  overlay.innerHTML = `
    <div style="background:var(--superficie);border:1px solid var(--borde2);border-radius:var(--radio);
      padding:28px;width:min(92vw,420px);display:flex;flex-direction:column;gap:20px">

      <div style="display:flex;align-items:center;justify-content:space-between">
        <h3 style="font-family:var(--fuente-display);font-size:20px;letter-spacing:.5px">Centrar foto</h3>
        <button onclick="cerrarPosicionadorAvatar()" style="background:none;border:none;color:var(--apagado);font-size:20px;cursor:pointer">✕</button>
      </div>

      <!-- Vista previa grande en círculo que se actualiza en tiempo real al mover los sliders -->
      <div style="display:flex;justify-content:center">
        <div id="circuloVistaGrande" style="
          width:140px;height:140px;border-radius:50%;
          border:3px solid var(--acento);
          background-image:${imgSrc};
          background-size:cover;
          background-position:${posAvatarX}% ${posAvatarY}%;
          flex-shrink:0">
        </div>
      </div>

      <!-- Slider para ajustar la posición horizontal de la imagen -->
      <div>
        <label style="font-size:10px;color:var(--apagado);font-family:var(--fuente-ui);letter-spacing:1px;
          text-transform:uppercase;display:block;margin-bottom:8px">
          Posición horizontal ←→
        </label>
        <!-- oninput actualiza la vista previa en tiempo real al arrastrar -->
        <input type="range" id="sliderX" min="0" max="100" value="${posAvatarX}"
          oninput="actualizarPosAvatar()"
          style="width:100%;accent-color:var(--acento);cursor:pointer" />
      </div>

      <!-- Slider para ajustar la posición vertical de la imagen -->
      <div>
        <label style="font-size:10px;color:var(--apagado);font-family:var(--fuente-ui);letter-spacing:1px;
          text-transform:uppercase;display:block;margin-bottom:8px">
          Posición vertical ↑↓
        </label>
        <input type="range" id="sliderY" min="0" max="100" value="${posAvatarY}"
          oninput="actualizarPosAvatar()"
          style="width:100%;accent-color:var(--acento);cursor:pointer" />
      </div>

      <!-- Presets de posición rápida para casos comunes (cara arriba, centrada, etc.) -->
      <div>
        <p style="font-size:10px;color:var(--apagado);margin-bottom:8px">Presets rápidos:</p>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button onclick="establecerPresetAvatar(50,20)" class="preset-posicion">Arriba</button>
          <button onclick="establecerPresetAvatar(50,50)" class="preset-posicion">Centro</button>
          <button onclick="establecerPresetAvatar(50,80)" class="preset-posicion">Abajo</button>
          <button onclick="establecerPresetAvatar(20,30)" class="preset-posicion">Izq. arriba</button>
          <button onclick="establecerPresetAvatar(80,30)" class="preset-posicion">Der. arriba</button>
        </div>
      </div>

      <!-- Botones para aplicar la posición o cancelar sin cambios -->
      <div style="display:flex;gap:10px">
        <button onclick="aplicarPosAvatar()" style="
          flex:1;padding:11px;border-radius:var(--radio-peq);border:none;
          background:var(--acento);color:#fff;font-family:var(--fuente-ui);
          font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer">
          ✓ Aplicar posición
        </button>
        <button onclick="cerrarPosicionadorAvatar()" style="
          padding:11px 16px;border-radius:var(--radio-peq);border:1px solid var(--borde2);
          background:transparent;color:var(--tenue);font-size:12px;cursor:pointer">
          Cancelar
        </button>
      </div>
    </div>`;

  // Cierra el posicionador al hacer click en el fondo oscuro
  overlay.addEventListener('click', e => { if (e.target === overlay) cerrarPosicionadorAvatar(); });
}

// Actualiza la vista previa circular en tiempo real al mover cualquiera de los dos sliders
function actualizarPosAvatar() {
  posAvatarX = parseInt(document.getElementById('sliderX').value);
  posAvatarY = parseInt(document.getElementById('sliderY').value);
  const circulo = document.getElementById('circuloVistaGrande');
  // Mueve la imagen de fondo según los valores de los sliders
  if (circulo) circulo.style.backgroundPosition = `${posAvatarX}% ${posAvatarY}%`;
}

// Aplica un preset de posición predefinido actualizando los sliders y la vista previa
function establecerPresetAvatar(x, y) {
  posAvatarX = x; posAvatarY = y;
  const sx = document.getElementById('sliderX');
  const sy = document.getElementById('sliderY');
  // Mueve los sliders a los valores del preset
  if (sx) sx.value = x;
  if (sy) sy.value = y;
  actualizarPosAvatar();
}

// Aplica la posición ajustada a la vista previa principal y cierra el posicionador
function aplicarPosAvatar() {
  const vista = document.getElementById('vistaAvatar');
  if (vista) {
    vista.style.backgroundPosition = `${posAvatarX}% ${posAvatarY}%`;
  }
  // Guarda la posición en window._posAvatar para que guardarPerfil() la persista
  window._posAvatar = `${posAvatarX}% ${posAvatarY}%`;
  cerrarPosicionadorAvatar();
  notificacion('✓ Posición aplicada');
}

// Cierra el posicionador de avatar ocultando el overlay
function cerrarPosicionadorAvatar() {
  const overlay = document.getElementById('overlayPosAvatar');
  if (overlay) overlay.style.display = 'none';
}

// Inicialización: espera a que el DOM esté listo, renderiza el formulario
// y añade los eventos después de que el HTML haya sido inyectado
document.addEventListener('DOMContentLoaded', () => {
  renderizarFormularioEdicion();
  // setTimeout de 100ms garantiza que el HTML del formulario ya está en el DOM
  // antes de intentar acceder a los elementos por ID
  setTimeout(() => {
    const vista = document.getElementById('vistaAvatar');
    if (vista) {
      vista.style.cursor = 'pointer';
      vista.title = 'Haz clic para centrar la foto';
      // Hacer clic en la vista previa abre el posicionador de avatar
      vista.addEventListener('click', abrirPosicionadorAvatar);
    }
    // Renderiza los huecos de favoritas con las películas actuales del usuario
    renderizarHuecosFavoritas();
    // Cierra el dropdown de búsqueda de favoritas al hacer click fuera de él
    document.addEventListener('click', e => {
      if (!e.target.closest('#buscadorFavoritas') && !e.target.closest('#resultadosFavoritas')) {
        const r = document.getElementById('resultadosFavoritas');
        if (r) r.style.display = 'none';
      }
    });
  }, 100);
});
</script>

<style>
/* Botón de subir foto: estilo de pastilla con fondo violeta tenue */
.btn-subir-foto {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: var(--radio-peq);
  background: var(--acento-fondo); border: 1px solid var(--acento);
  color: var(--acento-claro); font-size: 12px; font-family: var(--fuente-cuerpo);
}
.btn-subir-foto:hover { background: rgba(139,92,246,.18); }

/* Botones de preset de posición del avatar: pastillas pequeñas con hover violeta */
.preset-posicion {
  padding: 5px 10px; border-radius: 20px;
  border: 1px solid var(--borde2); background: var(--superficie2);
  color: var(--tenue); font-size: 11px; cursor: pointer; transition: all .15s;
}
.preset-posicion:hover { border-color: var(--acento); color: var(--acento-claro); }

/* Efecto hover en los resultados del buscador de favoritas */
#resultadosFavoritas div:hover { background: var(--superficie2); }
</style>
</body>
</html>
