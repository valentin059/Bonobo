<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse — BONOBO</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

<!-- Contenedor principal de la página de autenticación: layout de dos columnas -->
<div class="pagina-auth">

  <!-- ===================== COLUMNA IZQUIERDA: FORMULARIO ===================== -->
  <div class="auth-izquierda">
    <div class="auth-formulario">

      <!-- Logo pequeño en la parte superior del formulario -->
      <div class="auth-superior">
        <div class="auth-marca"></div>
        <span class="auth-nombre">Bonobo</span>
      </div>

      <!-- Título y subtítulo -->
      <h1 class="auth-titulo">Crea tu<br>cuenta</h1>
      <p class="auth-subtitulo">Únete y empieza a registrar tus películas hoy</p>

      <!-- Caja de error: oculta por defecto, se muestra si el registro falla -->
      <div class="auth-error" id="authErr"></div>

      <!-- Campo de email -->
      <div class="grupo-campo">
        <label class="campo-etiqueta" for="correo">Email</label>
        <input class="campo-texto" type="email" id="correo" placeholder="tu@email.com" autocomplete="email" />
      </div>

      <!-- Campo de nombreUsuario (nombre de usuario único en la app) -->
      <div class="grupo-campo">
        <label class="campo-etiqueta" for="nombreUsuario">Username</label>
        <input class="campo-texto" type="text" id="nombreUsuario" placeholder="ej: bladi_movies" autocomplete="username" />
      </div>

      <!-- Campo de contraseña con indicador de fortaleza -->
      <div class="grupo-campo">
        <label class="campo-etiqueta" for="contrasena">Contraseña <small style="color:var(--apagado);font-weight:400">(mín. 8 caracteres)</small></label>
        <input class="campo-texto" type="password" id="contrasena" placeholder="••••••••" autocomplete="new-password" />
        <!-- Barra de fortaleza: el JS cambia su ancho y color según la seguridad de la contraseña -->
        <div class="contrasena-barra-contenedor"><div class="contrasena-barra" id="barraContrasena"></div></div>
        <!-- Texto descriptivo de la fortaleza: Débil / Regular / Buena / Fuerte -->
        <span class="contrasena-etiqueta" id="etiquetaContrasena"></span>
      </div>

      <!-- Campo para repetir la contraseña y confirmar que coincide -->
      <div class="grupo-campo">
        <label class="campo-etiqueta" for="contrasena2">Repetir contraseña</label>
        <input class="campo-texto" type="password" id="contrasena2" placeholder="••••••••" autocomplete="new-password" />
      </div>

      <!-- Botón principal de envío del formulario -->
      <button class="btn-enviar" id="btnRegistrarse">Crear cuenta gratis</button>

      <!-- Separador y enlace al login para usuarios que ya tienen cuenta -->
      <hr class="auth-separador" />
      <p class="auth-cambiar">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
      <a class="auth-volver" href="../index.html">← Volver al inicio</a>

    </div>
  </div>

  <!-- ===================== COLUMNA DERECHA: MOSAICO CINEMÁTICO ===================== -->
  <div class="auth-derecha">
    <!-- Grid de 15 imágenes de películas como fondo decorativo (igual que en login.html) -->
    <div class="auth-derecha-mosaico">
      <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1635805737707-575885ab0820?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1509347528160-9a9e33742cdb?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1604076850742-4c7221f3101b?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1531259683007-016a7b628fc3?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1510511459019-5dda7724fd87?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1525268323446-0505b6fe7778?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1524712245354-2c4e5e7121c0?w=300&q=60" alt="" />
      <img src="https://images.unsplash.com/photo-1635805737707-575885ab0820?w=300&q=60" alt="" />
    </div>
    <!-- Velo oscuro sobre el mosaico -->
    <div class="auth-derecha-velo"></div>
    <!-- Cita: el lema fundacional de la app -->
    <div class="auth-derecha-cita">
      <p class="auth-cita-texto">"Registrar películas<br>es el medio,<br>el juego es el fin."</p>
      <p class="auth-cita-subtitulo">— BONOBO · Lema fundacional</p>
    </div>
  </div>

</div>

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script>
  // Si el usuario ya tiene sesión activa, lo redirige al inicio directamente
  // Auto-redirect desactivado: permite visitar registro aunque haya sesión activa

  // ── Indicador de fortaleza de contraseña ──
  // Se ejecuta cada vez que el usuario escribe en el campo de contraseña
  document.getElementById('contrasena').addEventListener('input', function() {
    const contrasena  = this.value;
    const barra       = document.getElementById('barraContrasena');
    const etiqueta    = document.getElementById('etiquetaContrasena');

    // Suma puntos según los criterios de seguridad que cumple la contraseña
    let puntos = 0;
    if (contrasena.length >= 8)          puntos++; // Al menos 8 caracteres
    if (/[A-Z]/.test(contrasena))        puntos++; // Al menos una mayúscula
    if (/[0-9]/.test(contrasena))        puntos++; // Al menos un número
    if (/[^A-Za-z0-9]/.test(contrasena)) puntos++; // Al menos un carácter especial

    // Tabla de niveles: cada nivel tiene ancho, color y texto descriptivo
    const niveles = [
      { ancho:'0%',   color:'transparent',    texto:'' },           // 0 puntos: sin mostrar
      { ancho:'25%',  color:'var(--rojo)',     texto:'Débil' },      // 1 punto: rojo
      { ancho:'50%',  color:'var(--dorado)',   texto:'Regular' },    // 2 puntos: dorado
      { ancho:'75%',  color:'var(--cian)',     texto:'Buena' },      // 3 puntos: azul
      { ancho:'100%', color:'var(--verde)',    texto:'Fuerte ✓' },   // 4 puntos: verde
    ];

    // Aplica el nivel correspondiente a la barra y al texto
    const nivel = niveles[puntos] || niveles[0];
    barra.style.width      = nivel.ancho;
    barra.style.background = nivel.color;
    etiqueta.textContent   = nivel.texto;
    etiqueta.style.color   = nivel.color;
  });

  // ── Lógica del botón "Crear cuenta" ──
  document.getElementById('btnRegistrarse').addEventListener('click', () => {
    const correo        = document.getElementById('correo').value.trim();
    const nombreUsuario = document.getElementById('nombreUsuario').value.trim();
    const contrasena    = document.getElementById('contrasena').value;
    const contrasena2   = document.getElementById('contrasena2').value;
    const errorEl       = document.getElementById('authErr');
    errorEl.style.display = 'none';

    // Validación previa: comprueba que las dos contraseñas coincidan antes de llamar a AUTENTICACION
    if (contrasena !== contrasena2) { errorEl.textContent = 'Las contraseñas no coinciden.'; errorEl.style.display = 'block'; return; }

    // Intenta registrar al usuario con los datos del formulario
    const resultado = AUTENTICACION.registrar(correo, nombreUsuario, contrasena);
    if (resultado.ok) {
      // Si el registro es exitoso, inicia sesión automáticamente y redirige al inicio
      AUTENTICACION.iniciarSesion(correo, contrasena);
      window.location.href = '../index.html';
    } else {
      // Si falla (email duplicado, nombreUsuario en uso, etc.), muestra el error
      errorEl.textContent = resultado.err;
      errorEl.style.display = 'block';
    }
  });

  // Permite enviar el formulario pulsando Enter
  document.addEventListener('keydown', e => { if(e.key === 'Enter') document.getElementById('btnRegistrarse').click(); });
</script>
</body>
</html>
