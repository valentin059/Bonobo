<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BONOBO — Mis Listas</title>
    <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

    <header id="nav-placeholder"></header>

    <main class="contenedor pagina">

        <!-- ── VISTA: ÍNDICE DE LISTAS ────────────────────────────────────── -->
        <div id="vistaIndice">

            <div class="seccion-header" style="margin-bottom:32px">
                <h1 class="seccion-titulo" id="tituloIndice">Mis Listas</h1>
                <div class="seccion-linea"></div>
                <button class="btn btn--primary btn--sm" onclick="abrirModalCrear()">
                    + Nueva lista
                </button>
            </div>

            <div class="listas-lista" id="listaListas">
                <p class="text-faint" style="font-size:13px">Cargando…</p>
            </div>

        </div>

        <!-- ── VISTA: DETALLE DE UNA LISTA ───────────────────────────────── -->
        <div id="vistaDetalle" class="oculto">

            <button class="btn btn--ghost btn--sm" style="margin-bottom:24px"
                    id="btnVolver" onclick="volverAlIndice()">
                ← Volver a mis listas
            </button>

            <div class="lista-detalle-header">
                <div class="lista-detalle-info">
                    <h1 class="lista-detalle-nombre" id="detalleNombre">—</h1>
                    <p class="lista-detalle-desc" id="detalleDesc"></p>
                    <div class="lista-detalle-meta">
                        <span id="detalleBadge"></span>
                        <span id="detalleCuenta"></span>
                    </div>
                </div>
                <div id="detalleAcciones" style="display:flex;gap:8px;flex-shrink:0;align-self:flex-start">
                    <!-- Editar/Borrar solo si es lista propia -->
                </div>
            </div>

            <!-- Búsqueda para añadir películas (solo en lista propia) -->
            <div id="seccionAñadir" class="oculto" style="margin-bottom:32px">
                <div style="font-size:11px;font-weight:600;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">
                    Añadir película
                </div>
                <div style="display:flex;gap:8px;max-width:480px">
                    <input class="form-input" type="text" id="inputBuscarPeli"
                           placeholder="Buscar por título…"
                           oninput="buscarParaAñadir(this.value)"
                           autocomplete="off"
                           style="flex:1" />
                </div>
                <div id="resultadosAñadir" style="max-width:480px;margin-top:4px"></div>
            </div>

            <!-- Grid de películas de la lista -->
            <div class="peliculas-grid" id="gridDetalle"></div>

        </div>

    </main>

    <!-- ── MODAL: CREAR LISTA ─────────────────────────────────────────────── -->
    <div class="modal-overlay modal-overlay--hidden" id="modalCrear">
        <div class="modal">
            <button class="modal-close" onclick="cerrarModal('modalCrear')">✕</button>
            <h2 class="modal-titulo">Nueva lista</h2>

            <div class="form-grupo">
                <label class="form-label">Nombre</label>
                <input class="form-input" type="text" id="crearNombre"
                       placeholder="Ej: Películas de los 90" maxlength="100" />
            </div>
            <div class="form-grupo">
                <label class="form-label">Descripción (opcional)</label>
                <input class="form-input" type="text" id="crearDesc"
                       placeholder="Una descripción breve…" maxlength="300" />
            </div>
            <div class="form-grupo">
                <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
                    <input type="checkbox" id="crearPublica" checked
                           style="width:16px;height:16px;accent-color:var(--accent)" />
                    <span style="font-size:13px;color:var(--muted)">Lista pública</span>
                </label>
            </div>

            <p class="form-error" id="errorCrear"></p>

            <button class="btn btn--primary" style="width:100%;margin-top:8px"
                    onclick="crearLista()">
                Crear lista
            </button>
        </div>
    </div>

    <!-- ── MODAL: EDITAR LISTA ────────────────────────────────────────────── -->
    <div class="modal-overlay modal-overlay--hidden" id="modalEditar">
        <div class="modal">
            <button class="modal-close" onclick="cerrarModal('modalEditar')">✕</button>
            <h2 class="modal-titulo">Editar lista</h2>

            <input type="hidden" id="editIdLista" />

            <div class="form-grupo">
                <label class="form-label">Nombre</label>
                <input class="form-input" type="text" id="editNombre" maxlength="100" />
            </div>
            <div class="form-grupo">
                <label class="form-label">Descripción (opcional)</label>
                <input class="form-input" type="text" id="editDesc" maxlength="300" />
            </div>
            <div class="form-grupo">
                <label style="display:flex;align-items:center;gap:10px;cursor:pointer">
                    <input type="checkbox" id="editPublica"
                           style="width:16px;height:16px;accent-color:var(--accent)" />
                    <span style="font-size:13px;color:var(--muted)">Lista pública</span>
                </label>
            </div>

            <p class="form-error" id="errorEditar"></p>

            <button class="btn btn--primary" style="width:100%;margin-top:8px"
                    onclick="guardarEdicion()">
                Guardar cambios
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script>
        let usuarioId    = null;
        let listaActual  = null;   // datos completos de la lista abierta
        let esListaPropia = false;
        let buscarTimer  = null;

        function mostrarToast(msg, tipo = 'ok') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast toast--${tipo} toast--visible`;
            setTimeout(() => { t.className = 'toast'; }, 2800);
        }

        function cerrarModal(id) {
            document.getElementById(id).classList.add('modal-overlay--hidden');
        }

        function irAPelicula(tmdbId) {
            location.href = `pelicula.html?id=${tmdbId}`;
        }

        // ── Índice de listas ──────────────────────────────────────────────

        async function cargarListas(idUsuario) {
            const contenedor = document.getElementById('listaListas');
            try {
                const listas = await api.usuarios.listas(idUsuario);
                if (listas.length === 0) {
                    contenedor.innerHTML = `
                        <div class="estado-vacio">
                            <p class="estado-vacio__titulo">Sin listas todavía</p>
                            <p class="estado-vacio__desc">Crea tu primera lista con el botón de arriba.</p>
                        </div>
                    `;
                    return;
                }
                contenedor.innerHTML = listas.map(l => renderListaCard(l, true)).join('');
            } catch {
                mostrarToast('Error al cargar las listas', 'error');
            }
        }

        function renderListaCard(l, conAcciones = false) {
            return `
                <div class="lista-card" onclick="abrirLista(${l.id})">
                    <div class="lista-card__info">
                        <div class="lista-card__nombre">${escapeHTML(l.nombre)}</div>
                        ${l.descripcion ? `<div class="lista-card__desc">${escapeHTML(l.descripcion)}</div>` : ''}
                    </div>
                    <span class="lista-badge lista-badge--${l.es_publica ? 'publica' : 'privada'}">
                        ${l.es_publica ? 'Pública' : 'Privada'}
                    </span>
                    <div class="lista-card__count">${l.total_peliculas ?? 0} pel.</div>
                    ${conAcciones ? `
                    <div class="lista-card__acciones" onclick="event.stopPropagation()">
                        <button class="btn btn--ghost btn--sm"
                                data-id="${l.id}"
                                data-nombre="${escapeHTML(l.nombre)}"
                                data-desc="${escapeHTML(l.descripcion || '')}"
                                data-publica="${l.es_publica}"
                                onclick="abrirModalEditarDesdeBtn(this)">
                            Editar
                        </button>
                        <button class="btn btn--ghost btn--sm"
                                style="color:var(--error);border-color:var(--error)"
                                onclick="confirmarBorrar(${l.id})">
                            Borrar
                        </button>
                    </div>` : ''}
                </div>
            `;
        }

        function abrirModalEditarDesdeBtn(btn) {
            abrirModalEditar(
                parseInt(btn.dataset.id),
                btn.dataset.nombre,
                btn.dataset.desc,
                btn.dataset.publica === 'true'
            );
        }

        // ── Detalle de lista ──────────────────────────────────────────────

        async function abrirLista(idLista, pushHistory = true) {
            document.getElementById('vistaIndice').classList.add('oculto');
            document.getElementById('vistaDetalle').classList.remove('oculto');
            document.getElementById('gridDetalle').innerHTML =
                '<p class="text-faint" style="font-size:13px">Cargando…</p>';

            // actualizamos la URL sin navegar
            if (pushHistory) {
                history.pushState({ idLista }, '', `listas.html?id=${idLista}`);
            } else {
                history.replaceState({ idLista }, '', `listas.html?id=${idLista}`);
            }

            try {
                const lista = await api.listas.detalle(idLista);
                listaActual = lista;
                esListaPropia = (lista.id_usuario === usuarioId);

                document.getElementById('detalleNombre').textContent = lista.nombre;
                document.getElementById('detalleDesc').textContent   = lista.descripcion || '';
                document.getElementById('detalleBadge').innerHTML =
                    `<span class="lista-badge lista-badge--${lista.es_publica ? 'publica' : 'privada'}">${lista.es_publica ? 'Pública' : 'Privada'}</span>`;
                document.getElementById('detalleCuenta').textContent =
                    `${lista.peliculas.length} película${lista.peliculas.length !== 1 ? 's' : ''}`;

                // acciones de editar/borrar solo en lista propia
                const acciones = document.getElementById('detalleAcciones');
                if (esListaPropia) {
                    acciones.innerHTML = `
                        <button class="btn btn--ghost btn--sm"
                                data-id="${lista.id}"
                                data-nombre="${escapeHTML(lista.nombre)}"
                                data-desc="${escapeHTML(lista.descripcion || '')}"
                                data-publica="${lista.es_publica}"
                                onclick="abrirModalEditarDesdeBtn(this)">
                            Editar
                        </button>
                        <button class="btn btn--ghost btn--sm"
                                style="color:var(--error);border-color:var(--error)"
                                onclick="confirmarBorrar(${lista.id})">
                            Borrar
                        </button>
                    `;
                    document.getElementById('seccionAñadir').classList.remove('oculto');
                } else {
                    acciones.innerHTML = '';
                    document.getElementById('seccionAñadir').classList.add('oculto');
                }

                renderizarPeliculasLista(lista.peliculas);

            } catch {
                mostrarToast('Error al cargar la lista', 'error');
                volverAlIndice();
            }
        }

        function renderizarPeliculasLista(peliculas) {
            const grid = document.getElementById('gridDetalle');
            if (peliculas.length === 0) {
                grid.innerHTML = `<div class="estado-vacio" style="grid-column:1/-1">
                    <p class="estado-vacio__desc">Esta lista está vacía. Añade películas con el buscador de arriba.</p>
                </div>`;
                return;
            }
            grid.innerHTML = peliculas.map(p => `
                <div class="pelicula-card">
                    <div class="pelicula-card__poster" onclick="irAPelicula(${p.tmdb_id})" style="cursor:pointer">
                        ${p.poster_url
                            ? `<img class="pelicula-card__img" src="${p.poster_url}" alt="${p.titulo}" loading="lazy">`
                            : `<div class="pelicula-card__no-img">SIN IMAGEN</div>`
                        }
                        ${esListaPropia ? `
                        <div class="pelicula-card__badges">
                            <button class="badge" style="background:rgba(244,63,94,0.8);color:#fff;cursor:pointer;font-size:12px"
                                    title="Quitar de la lista"
                                    onclick="event.stopPropagation(); quitarDeLista(${p.tmdb_id})">✕</button>
                        </div>` : ''}
                    </div>
                    <div class="pelicula-card__info">
                        <div class="pelicula-card__titulo">${p.titulo || '—'}</div>
                        <div class="pelicula-card__anio">${p.anio_estreno || ''}</div>
                    </div>
                </div>
            `).join('');
        }

        function volverAlIndice() {
            document.getElementById('vistaDetalle').classList.add('oculto');
            document.getElementById('vistaIndice').classList.remove('oculto');
            document.getElementById('inputBuscarPeli').value = '';
            document.getElementById('resultadosAñadir').innerHTML = '';
            history.pushState({}, '', 'listas.html');
            listaActual = null;
        }

        // ── Añadir película a la lista ─────────────────────────────────────

        function buscarParaAñadir(query) {
            clearTimeout(buscarTimer);
            const res = document.getElementById('resultadosAñadir');
            if (!query.trim()) { res.innerHTML = ''; return; }

            buscarTimer = setTimeout(async () => {
                try {
                    const data = await api.peliculas.buscar(query, 0, 6);
                    const resultados = data.results || [];
                    if (!resultados.length) { res.innerHTML = ''; return; }
                    res.innerHTML = resultados.map(p => `
                        <div class="fav-result-item" style="max-width:480px"
                             onclick="añadirAPelicula(${p.tmdb_id})">
                            ${p.poster_url ? `<img src="${p.poster_url}" alt="">` : ''}
                            <span>${p.titulo}${p.anio_estreno ? ` (${p.anio_estreno})` : ''}</span>
                        </div>
                    `).join('');
                } catch { res.innerHTML = ''; }
            }, 350);
        }

        async function añadirAPelicula(tmdbId) {
            if (!listaActual) return;
            document.getElementById('resultadosAñadir').innerHTML = '';
            document.getElementById('inputBuscarPeli').value = '';
            try {
                await api.listas.añadirPelicula(listaActual.id, tmdbId);
                mostrarToast('Película añadida a la lista ✓');
                // recargar detalle
                await abrirLista(listaActual.id);
            } catch (err) {
                mostrarToast(err.message || 'Error al añadir', 'error');
            }
        }

        async function quitarDeLista(tmdbId) {
            if (!listaActual) return;
            try {
                await api.listas.quitarPelicula(listaActual.id, tmdbId);
                mostrarToast('Película quitada de la lista');
                await abrirLista(listaActual.id);
            } catch (err) {
                mostrarToast(err.message || 'Error al quitar', 'error');
            }
        }

        // ── Crear lista ────────────────────────────────────────────────────

        function abrirModalCrear() {
            document.getElementById('crearNombre').value = '';
            document.getElementById('crearDesc').value   = '';
            document.getElementById('crearPublica').checked = true;
            document.getElementById('errorCrear').className = 'form-error';
            document.getElementById('modalCrear').classList.remove('modal-overlay--hidden');
        }

        async function crearLista() {
            const nombre    = document.getElementById('crearNombre').value.trim();
            const desc      = document.getElementById('crearDesc').value.trim() || null;
            const esPublica = document.getElementById('crearPublica').checked;
            const errorEl   = document.getElementById('errorCrear');

            if (!nombre) {
                errorEl.textContent = 'El nombre es obligatorio';
                errorEl.className = 'form-error form-error--visible';
                return;
            }

            try {
                await api.listas.crear({ nombre, descripcion: desc, es_publica: esPublica });
                cerrarModal('modalCrear');
                mostrarToast('Lista creada ✓');
                await cargarListas(usuarioId);
            } catch (err) {
                errorEl.textContent = err.message || 'Error al crear';
                errorEl.className = 'form-error form-error--visible';
            }
        }

        // ── Editar lista ───────────────────────────────────────────────────

        function abrirModalEditar(idLista, nombre, desc, esPublica) {
            document.getElementById('editIdLista').value = idLista;
            document.getElementById('editNombre').value  = nombre;
            document.getElementById('editDesc').value    = desc;
            document.getElementById('editPublica').checked = esPublica;
            document.getElementById('errorEditar').className = 'form-error';
            document.getElementById('modalEditar').classList.remove('modal-overlay--hidden');
        }

        async function guardarEdicion() {
            const idLista   = parseInt(document.getElementById('editIdLista').value);
            const nombre    = document.getElementById('editNombre').value.trim();
            const desc      = document.getElementById('editDesc').value.trim() || null;
            const esPublica = document.getElementById('editPublica').checked;
            const errorEl   = document.getElementById('errorEditar');

            if (!nombre) {
                errorEl.textContent = 'El nombre es obligatorio';
                errorEl.className = 'form-error form-error--visible';
                return;
            }

            try {
                await api.listas.editar(idLista, { nombre, descripcion: desc, es_publica: esPublica });
                cerrarModal('modalEditar');
                mostrarToast('Lista actualizada ✓');
                // refrescar según la vista activa
                if (!document.getElementById('vistaDetalle').classList.contains('oculto')) {
                    await abrirLista(idLista);
                } else {
                    await cargarListas(usuarioId);
                }
            } catch (err) {
                errorEl.textContent = err.message || 'Error al guardar';
                errorEl.className = 'form-error form-error--visible';
            }
        }

        // ── Borrar lista ───────────────────────────────────────────────────

        async function confirmarBorrar(idLista) {
            if (!confirm('¿Borrar esta lista? No se puede deshacer.')) return;
            try {
                await api.listas.borrar(idLista);
                mostrarToast('Lista eliminada');
                volverAlIndice();
                await cargarListas(usuarioId);
            } catch (err) {
                mostrarToast(err.message || 'Error al borrar', 'error');
            }
        }

        // ── Init ──────────────────────────────────────────────────────────

        document.addEventListener('DOMContentLoaded', async () => {
            renderNav('../');

            const params  = new URLSearchParams(window.location.search);
            const idParam = params.get('id');

            if (idParam) {
                // acceso directo a una lista — no requiere login
                if (auth.estaLogueado()) {
                    try {
                        const usuario = await api.usuarios.mePerfil();
                        usuarioId = usuario.id;
                    } catch { /* si falla el perfil, seguimos sin usuarioId */ }
                }
                document.getElementById('btnVolver').textContent = '← Volver';
                document.getElementById('btnVolver').onclick = () => history.back();
                await abrirLista(parseInt(idParam), false);
            } else {
                // página de mis listas — requiere login
                if (!auth.estaLogueado()) {
                    window.location.href = 'login.html';
                    return;
                }
                const usuario = await api.usuarios.mePerfil();
                usuarioId = usuario.id;
                await cargarListas(usuarioId);
            }
        });

        // navegación del browser (botón atrás)
        window.addEventListener('popstate', (e) => {
            if (e.state?.idLista) {
                abrirLista(e.state.idLista);
            } else {
                volverAlIndice();
            }
        });
    </script>

</body>
</html>
