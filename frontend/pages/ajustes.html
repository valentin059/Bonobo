<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BONOBO — Ajustes</title>
    <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

    <header id="nav-placeholder"></header>

    <main class="contenedor pagina">

        <h1 class="seccion-titulo" style="font-size:22px;margin-bottom:28px">Ajustes</h1>

        <!-- ── DATOS DEL PERFIL ──────────────────────────────────────────── -->
        <section class="seccion" style="max-width:480px">
            <div class="seccion-header" style="margin-bottom:20px">
                <h2 class="seccion-titulo">Perfil</h2>
                <div class="seccion-linea"></div>
            </div>

            <div class="form-grupo">
                <label class="form-label">URL del avatar</label>
                <input class="form-input" type="url" id="inputAvatar" placeholder="https://…" />
            </div>
            <div class="form-grupo">
                <label class="form-label">Biografía</label>
                <input class="form-input" type="text" id="inputBio" placeholder="Cuéntanos algo…" maxlength="200" />
            </div>

            <p class="form-error" id="errorPerfil"></p>
            <button class="btn btn--primary" style="margin-top:8px" onclick="guardarPerfil()">
                Guardar perfil
            </button>
        </section>

        <!-- ── CONTRASEÑA ────────────────────────────────────────────────── -->
        <section class="seccion" style="max-width:480px;margin-top:40px">
            <div class="seccion-header" style="margin-bottom:20px">
                <h2 class="seccion-titulo">Contraseña</h2>
                <div class="seccion-linea"></div>
            </div>

            <div class="form-grupo">
                <label class="form-label">Contraseña actual</label>
                <input class="form-input" type="password" id="inputPasswordActual" autocomplete="current-password" />
            </div>
            <div class="form-grupo">
                <label class="form-label">Nueva contraseña</label>
                <input class="form-input" type="password" id="inputPasswordNueva" autocomplete="new-password" />
            </div>
            <div class="form-grupo">
                <label class="form-label">Repetir nueva contraseña</label>
                <input class="form-input" type="password" id="inputPasswordRepetir" autocomplete="new-password" />
            </div>

            <p class="form-error" id="errorPassword"></p>
            <button class="btn btn--primary" style="margin-top:8px" onclick="guardarPassword()">
                Guardar contraseña
            </button>
        </section>

    </main>

    <div class="toast" id="toast"></div>

    <script src="../js/api.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/nav.js"></script>
    <script src="../js/logros-notif.js"></script>
    <script src="../js/ajustes.js"></script>

</body>
</html>
